<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection | TAKA.TUKRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap");
      body {
        font-family: "Hind Siliguri", sans-serif;
        background-color: #0a0a0a;
        color: white;
      }
      .glass-morphism {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .card-hover:hover {
        transform: translateY(-10px);
        border-color: #fbbf24;
        box-shadow: 0 20px 40px -15px rgba(251, 191, 36, 0.15);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <header
      class="p-6 flex justify-between items-center border-b border-gray-800 sticky top-0 bg-black z-50"
    >
      <div class="text-2xl font-bold tracking-tighter">
        <span class="text-white">TAKA.</span
        ><span class="text-yellow-500">TUKRO</span>
      </div>
      <nav class="hidden lg:flex space-x-8 text-sm uppercase tracking-widest">
        <a href="/index.html" class="hover:text-yellow-500 transition">হোম</a>
        <a
          href="/Collection/collection.html"
          class="text-yellow-500 border-b border-yellow-500"
          >কালেকশন</a
        >
        <a href="#" class="hover:text-yellow-500 transition">বিক্রি করুন</a>
      </nav>
      <div class="flex items-center gap-4">
        <button
          id="theme-toggle"
          class="px-4 py-2 rounded-full border border-white/10 hover:bg-white/10 transition text-sm"
        >
          ☀️ Light Mode
        </button>
        <div class="relative">
          <button
            onclick="openMiniCart()"
            class="text-white hover:text-yellow-500 transition text-2xl"
          >
            🛒
          </button>
          <span
            id="cart-count"
            class="cart-count absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center"
            >0</span
          >
        </div>
        <button
          class="bg-yellow-500 text-black px-6 py-2 rounded-full font-bold hover:bg-yellow-400 transition"
        >
          লগইন
        </button>
      </div>
    </header>

    <section class="py-16 px-6 text-center">
      <h1 class="text-4xl md:text-6xl font-bold mb-4">
        আমাদের <span class="text-yellow-500">সেরা</span> কালেকশন
      </h1>
      <p class="text-gray-400 max-w-2xl mx-auto">
        ইতিহাস ও স্মৃতির টুকরো—আমাদের কাছে প্রতিটি নোটের রয়েছে আলাদা গল্প। আপনার
        পছন্দের নোটটি খুঁজে নিন।
      </p>
    </section>

    <div
      class="max-w-7xl mx-auto px-6 mb-12 flex flex-col md:flex-row justify-between items-center gap-4"
    >
      <div class="relative w-full md:w-96">
        <input
          type="text"
          id="searchInput"
          placeholder="নোট খুঁজুন (যেমন: ৫০০ টাকা)..."
          class="w-full bg-gray-900 border border-gray-700 px-5 py-3 rounded-lg focus:outline-none focus:border-yellow-500"
        />
        <i class="fas fa-search absolute right-4 top-4 text-gray-500"></i>
      </div>
      <div class="w-full md:w-auto">
        <select
          id="filterDropdown"
          class="bg-white/5 border border-white/10 text-white rounded-xl px-6 py-3 focus:outline-none focus:border-yellow-500 transition cursor-pointer w-full"
        >
          <option value="all">সব কালেকশন</option>
          <option value="rare">রেয়ার নোট</option>
          <option value="damaged">ছেঁড়া/ড্যামেজড</option>
        </select>
      </div>
    </div>

    <main class="max-w-[1400px] mx-auto px-6 pb-24">
      <div class="flex flex-col lg:flex-row gap-10">
        <!-- বাম পাশে নোটের গ্রিড -->
        <div
          id="collection-container"
          class="flex-1 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"
        >
          <!-- জাভাস্ক্রিপ্ট দিয়ে কার্ডগুলো এখানে আসবে -->
        </div>

        <!-- ডান পাশে আপনার সংগৃহীত আইটেম এবং হিসাব -->
        <div class="lg:w-80 shrink-0">
          <div id="cart-calculation" class="sticky top-28">
            <!-- এখানে কার্টের আইটেম এবং হিসাব দেখা যাবে -->
          </div>
        </div>
      </div>
    </main>

    <footer class="border-t border-gray-800 py-10 text-center text-gray-500">
      <p>&copy; ২০২৬ TAKA.TUKRO | তানজীম আহমেদ উৎস কর্তৃক ডিজাইনকৃত</p>
    </footer>

    <script src="collection.js"></script>
  </body>
</html>
