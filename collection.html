<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taka Tukro - Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap");
      body {
        font-family: "Hind Siliguri", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#0a0a0a] text-gray-200 transition-colors duration-300">
    <!-- Navigation -->
    <nav
      class="p-6 flex justify-between items-center border-b border-white/10 max-w-7xl mx-auto"
    >
      <div class="text-2xl font-bold tracking-tighter text-white">
        TAKA<span class="text-orange-500">.TUKRO</span>
      </div>
      <div class="flex items-center gap-6">
        <a
          href="index.html"
          class="hover:text-orange-500 transition text-sm font-medium"
          >হোম পেজ</a
        >
        <button
          id="theme-toggle"
          class="w-10 h-10 flex items-center justify-center rounded-full border border-white/10 hover:bg-white/10 transition text-xl"
          title="Toggle Theme"
        >
          ☀️
        </button>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto p-8">
      <div class="mb-16 text-center">
        <span
          class="text-orange-500 font-bold uppercase tracking-widest text-xs"
          >Premium Museum</span
        >
        <h1 class="text-4xl md:text-5xl font-extrabold text-white mt-2 mb-4">
          আমাদের শাহী
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-600"
            >সংগ্রহশালা</span
          >
        </h1>
        <div class="w-24 h-1 bg-orange-500 mx-auto rounded-full"></div>
        <p
          class="text-gray-400 mt-6 max-w-xl mx-auto text-sm md:text-base leading-relaxed"
        >
          বিশ্বের সবচেয়ে দুর্লভ, ঐতিহাসিক এবং অদ্ভুতভাবে ছিঁড়ে যাওয়া নোটগুলোর এক
          অনন্য সংগ্রহশালা। প্রতিটি নোটের পেছনে রয়েছে একেকটি করুণ (অথবা হাসির)
          কাহিনী।
        </p>
      </div>

      <!-- Search and Filter Section -->
      <div
        class="mb-12 flex flex-col md:flex-row gap-4 items-center justify-between bg-white/5 p-6 rounded-2xl border border-white/10 glass-card"
      >
        <div class="relative w-full md:w-2/5">
          <input
            type="text"
            id="searchInput"
            placeholder="নোটের নাম দিয়ে খুঁজুন..."
            class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 pl-12 focus:border-orange-500 outline-none transition text-white"
          />
          <span class="absolute left-4 top-3.5 text-gray-500 text-xl">🔍</span>
        </div>

        <div class="w-full md:w-1/4">
          <select
            id="categoryFilter"
            class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 focus:border-orange-500 outline-none transition text-gray-300 appearance-none cursor-pointer"
          >
            <option value="all">সব ক্যাটাগরি</option>
            <option value="ছিঁড়া">ছিঁড়া নোট</option>
            <option value="টেপ লাগানো">টেপ লাগানো</option>
            <option value="ইঁদুরে খাওয়া">ইঁদুরে খাওয়া</option>
            <option value="পুরানো">ঐতিহাসিক/পুরানো</option>
          </select>
        </div>

        <div class="w-full md:w-1/4">
          <select
            id="sortOrder"
            class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 focus:border-orange-500 outline-none transition text-gray-300 appearance-none cursor-pointer"
          >
            <option value="default">সর্টিং করুন</option>
            <option value="lowToHigh">দাম: কম থেকে বেশি</option>
            <option value="highToLow">দাম: বেশি থেকে কম</option>
          </select>
        </div>
      </div>

      <div
        id="collection-grid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"
      ></div>
    </div>

    <footer
      class="py-10 text-center border-t border-white/10 text-gray-500 mt-20"
    >
      <p>&copy; ২০২৬ টাকা-টুকরো ডট কম | কালেকশনগুলো সবই কাল্পনিক (হয়তো!)</p>
    </footer>

    <script src="script.js"></script>
    <script src="collection.js"></script>
  </body>
</html>
